version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: retirewise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/retirewise
      JWT_SECRET: change-this-secret
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - postgres

volumes:
  pgdata:
